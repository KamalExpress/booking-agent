version: '3.8'

services:
  cloud-saas:
    image: cloud-saas:prod
    build: 
      context: ..
      dockerfile: Dockerfile
    container_name: cloud-saas-prod
    restart: always
    ports:
      # Expose port 8743 for the Cloudflare Tunnel daemon to route to
      - "127.0.0.1:8743:8000"
    environment:
      - DATABASE_URL
      - SECRET_KEY
      - VAPID_PUBLIC_KEY
      - VAPID_PRIVATE_KEY
      - SUPER_ADMIN_EMAIL
      - SUPER_ADMIN_PASSWORD
      - ENVIRONMENT=production
    depends_on:
      - db
    networks:
      - saas-network
    volumes:
      - saas_data_prod:/app/data

  operator-worker:
    image: operator-worker:prod
    build: 
      context: ../../operator-agent
      dockerfile: Dockerfile
    container_name: operator-worker-prod
    restart: always
    environment:
      - SAAS_BASE_URL=http://cloud-saas-prod:8000
    depends_on:
      - cloud-saas
    networks:
      - saas-network
    volumes:
      - operator_data_prod:/app/data

  db:
    image: postgres:15-alpine
    container_name: cloud-saas-db-prod
    restart: always
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: vps_secure_db_pass_123
      POSTGRES_DB: booking_saas
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - saas-network

volumes:
  postgres_data_prod:
  operator_data_prod:
  saas_data_prod:

networks:
  saas-network:
    driver: bridge
