<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kamal Express SaaS{% endblock %}</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" href="/static/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <link rel="shortcut icon" href="/static/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#3B82F6', 600: '#2563EB' },
                        dark: { 800: '#1e293b', 900: '#0f172a' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .btn {
            padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 600; transition: all 0.2s ease; cursor: pointer; text-align: center;
        }
        .btn-primary { background: linear-gradient(135deg, #3B82F6, #2563EB); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .nav-link { display: block; padding: 0.75rem 1rem; border-radius: 0.5rem; color: #94a3b8; transition: all 0.2s; }
        .nav-link:hover { background: rgba(59, 130, 246, 0.1); color: white; }
        .nav-link.active { background: #3B82F6; color: white; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 glass-card m-4 flex flex-col hidden md:flex">
        <div class="p-6">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">Kamal Express</h1>
            <p class="text-xs text-gray-400 mt-1">Distributed Orchestrator</p>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="/" class="nav-link {% if active_page == 'overview' %}active{% endif %}">
                📊 Overview
            </a>
            <a href="/workers" class="nav-link {% if active_page == 'workers' %}active{% endif %}">
                🖥️ Workers
            </a>
            <a href="/assignments" class="nav-link {% if active_page == 'assignments' %}active{% endif %}">
                📋 Assignments
            </a>
            <a href="/logs" class="nav-link {% if active_page == 'logs' %}active{% endif %}">
                📝 Event Logs
            </a>
        </nav>
        <div class="p-4 border-t border-gray-700">
            <button id="logoutBtn" class="w-full text-left text-red-400 hover:text-red-300 py-2 px-4 rounded hover:bg-gray-800 transition">
                🚪 Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        {% block content %}{% endblock %}
    </main>

    <!-- Auth Script injected from old index.html -->
    <script>
        const token = localStorage.getItem('token');
        if (!token && window.location.pathname !== '/login') {
            // Temporary measure to let us build the UI before wiring the login page back.
            // window.location.href = '/login';
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.reload();
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
