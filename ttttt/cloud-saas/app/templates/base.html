<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kamal Express SaaS{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: '#09090b',
                        foreground: '#fafafa',
                        muted: '#27272a',
                        'muted-foreground': '#a1a1aa',
                        border: '#27272a',
                        primary: '#fafafa',
                        'primary-foreground': '#18181b',
                        secondary: '#27272a',
                        'secondary-foreground': '#fafafa',
                        destructive: '#ef4444',
                        'destructive-foreground': '#fafafa',
                    },
                    borderRadius: {
                        lg: '0.5rem',
                        md: '0.375rem',
                        sm: '0.25rem'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.foreground');
        }
        
        .card {
            background-color: theme('colors.background');
            border: 1px solid theme('colors.border');
            border-radius: theme('borderRadius.lg');
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: theme('borderRadius.md');
            font-size: 0.875rem;
            font-weight: 500;
            height: 2.25rem;
            padding-left: 1rem;
            padding-right: 1rem;
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
            cursor: pointer;
        }
        .btn-primary { background-color: theme('colors.primary'); color: theme('colors.primary-foreground'); }
        .btn-primary:hover { background-color: #d4d4d8; }
        .btn-secondary { background-color: theme('colors.secondary'); color: theme('colors.secondary-foreground'); }
        .btn-secondary:hover { background-color: #3f3f46; }
        .btn-destructive { background-color: theme('colors.destructive'); color: theme('colors.destructive-foreground'); }
        .btn-destructive:hover { background-color: #dc2626; }
        
        .input {
            display: flex;
            height: 2.25rem;
            width: 100%;
            border-radius: theme('borderRadius.md');
            border: 1px solid theme('colors.border');
            background-color: transparent;
            padding-left: 0.75rem;
            padding-right: 0.75rem;
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
            font-size: 0.875rem;
            transition-property: border-color;
            transition-duration: 150ms;
        }
        .input:focus { outline: 2px solid theme('colors.border'); outline-offset: 2px; border-color: theme('colors.primary'); }
        
        .nav-link { 
            display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; 
            border-radius: theme('borderRadius.md'); color: theme('colors.muted-foreground'); 
            font-size: 0.875rem; font-weight: 500; transition: all 0.2s; 
        }
        .nav-link:hover { background-color: theme('colors.muted'); color: theme('colors.foreground'); }
        .nav-link.active { background-color: theme('colors.muted'); color: theme('colors.foreground'); }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="flex h-screen overflow-hidden antialiased">
    <!-- Sidebar -->
    <aside class="w-64 border-r border-border flex flex-col hidden md:flex">
        <div class="p-6">
            <h1 class="text-xl font-bold tracking-tight">Kamal Express</h1>
            <p class="text-sm text-muted-foreground mt-1">Orchestrator SaaS</p>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="/" class="nav-link {% if active_page == 'overview' %}active{% endif %}">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Overview
            </a>
            <a href="/workers" class="nav-link {% if active_page == 'workers' %}active{% endif %}">
                <i data-lucide="server" class="w-4 h-4"></i> Workers
            </a>
            <a href="/accounts" class="nav-link {% if active_page == 'accounts' %}active{% endif %}">
                <i data-lucide="users" class="w-4 h-4"></i> Accounts
            </a>
            <a href="/assignments" class="nav-link {% if active_page == 'assignments' %}active{% endif %}">
                <i data-lucide="briefcase" class="w-4 h-4"></i> Assignments
            </a>
            <a href="/logs" class="nav-link {% if active_page == 'logs' %}active{% endif %}">
                <i data-lucide="scroll-text" class="w-4 h-4"></i> Event Logs
            </a>
        </nav>
        <div class="p-4 border-t border-border">
            <button id="logoutBtn" class="nav-link w-full text-destructive hover:bg-destructive/10 hover:text-destructive">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
