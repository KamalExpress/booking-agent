<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kamal Express SaaS{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        .card {
            background-color: #09090b; /* zinc-950 */
            border: 1px solid #27272a; /* zinc-800 */
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            height: 2.25rem;
            padding-left: 1rem;
            padding-right: 1rem;
            transition: all 150ms;
            cursor: pointer;
        }
        .btn-primary { background-color: #fafafa; color: #18181b; } /* text-zinc-950 bg-zinc-50 */
        .btn-primary:hover { background-color: #e4e4e7; }
        .btn-secondary { background-color: #27272a; color: #fafafa; border: 1px solid #3f3f46; }
        .btn-secondary:hover { background-color: #3f3f46; }
        .btn-destructive { background-color: #ef4444; color: #fafafa; }
        .btn-destructive:hover { background-color: #dc2626; }
        
        .input {
            display: flex;
            height: 2.25rem;
            width: 100%;
            border-radius: 0.375rem;
            border: 1px solid #3f3f46; /* zinc-700 */
            background-color: #09090b;
            color: #fafafa;
            padding: 0.25rem 0.75rem;
            font-size: 0.875rem;
        }
        .input:focus { outline: 2px solid #27272a; border-color: #fafafa; }
        
        .nav-link { 
            display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; 
            border-radius: 0.375rem; color: #a1a1aa; /* zinc-400 */
            font-size: 0.875rem; font-weight: 500; transition: all 0.2s; 
        }
        .nav-link:hover { background-color: #27272a; color: #fafafa; }
        .nav-link.active { background-color: #27272a; color: #fafafa; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="flex h-screen overflow-hidden antialiased bg-[#09090b] text-[#fafafa]">
    <!-- Sidebar -->
    <aside class="w-64 border-r border-[#27272a] flex flex-col hidden md:flex">
        <div class="p-6">
            <h1 class="text-xl font-bold tracking-tight">Kamal Express</h1>
            <p class="text-sm text-[#a1a1aa] mt-1">Orchestrator SaaS</p>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="/" class="nav-link {% if active_page == 'overview' %}active{% endif %}">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Overview
            </a>
            <a href="/workers" class="nav-link {% if active_page == 'workers' %}active{% endif %}">
                <i data-lucide="server" class="w-4 h-4"></i> Workers
            </a>
            <a href="/accounts" class="nav-link {% if active_page == 'accounts' %}active{% endif %}">
                <i data-lucide="users" class="w-4 h-4"></i> Accounts
            </a>
            <a href="/assignments" class="nav-link {% if active_page == 'assignments' %}active{% endif %}">
                <i data-lucide="briefcase" class="w-4 h-4"></i> Assignments
            </a>
            <a href="/logs" class="nav-link {% if active_page == 'logs' %}active{% endif %}">
                <i data-lucide="scroll-text" class="w-4 h-4"></i> Event Logs
            </a>
        </nav>
        <div class="p-4 border-t border-[#27272a]">
            <button id="logoutBtn" class="nav-link w-full text-red-500 hover:bg-red-500/10 hover:text-red-400">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-y-auto">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
