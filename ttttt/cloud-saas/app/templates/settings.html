{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-2xl font-semibold text-gray-900 tracking-tight">System Settings</h1>
        <p class="text-sm text-gray-500 mt-1">Manage global integrations and secrets</p>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- CAPTCHA CONFIG -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
            <h3 class="font-medium text-gray-900">Captcha Provider</h3>
            {% if captcha_configured %}
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-green-50 text-green-700 border border-green-200">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                Configured
            </span>
            {% else %}
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-amber-50 text-amber-700 border border-amber-200">
                Not Configured
            </span>
            {% endif %}
        </div>
        
        <div class="p-6">
            <form action="/settings/captcha" method="post" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Provider</label>
                    <select name="provider" class="w-full text-sm border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-blue-500">
                        <option value="capsolver" {% if settings.get('captcha.provider') and settings.get('captcha.provider').value == 'capsolver' %}selected{% endif %}>CapSolver</option>
                        <option value="nopecha" {% if settings.get('captcha.provider') and settings.get('captcha.provider').value == 'nopecha' %}selected{% endif %}>NopeCha</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                    <input type="password" name="api_key" placeholder="{% if captcha_configured %}•••••••••••••••••••• (Leave blank to keep current){% else %}Enter API Key{% endif %}" class="w-full text-sm border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    <p class="text-xs text-gray-500 mt-2">API Keys are encrypted at rest and never exposed to the frontend.</p>
                </div>
                
                <div class="pt-2">
                    <button type="submit" class="w-full inline-flex justify-center items-center px-4 py-2 text-sm font-medium rounded-lg shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Save Settings
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
