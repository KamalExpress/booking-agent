version: '3.8'

services:
  postgres_staging:
    image: postgres:15
    container_name: postgres_staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: vps_secure_db_pass_123
      POSTGRES_DB: booking_saas_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - sam-agent-platform_staging

  cloud-saas-staging:
    image: cloud-saas:staging
    build: .
    container_name: cloud-saas-staging
    restart: unless-stopped
    ports:
      - "9743:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
    volumes:
      - ./private_key.pem:/app/private_key.pem
    depends_on:
      - postgres_staging
    networks:
      - sam-agent-platform_staging

  operator-agent-staging:
    image: operator-agent:staging
    build:
      context: ../operator-agent
      dockerfile: Dockerfile
    container_name: operator-agent-staging
    restart: unless-stopped
    environment:
      - BASE_URL=http://cloud-saas-staging:8000
    depends_on:
      - cloud-saas-staging
    networks:
      - sam-agent-platform_staging

networks:
  sam-agent-platform_staging:
    driver: bridge

volumes:
  postgres_staging_data:
